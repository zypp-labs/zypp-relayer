# ZRN API on Fly.io
# See https://fly.io/docs/reference/configuration/

app = "zrn-api"

[build]

[deploy]
  release_command = "node dist/store/run-migrate.js"

[env]
  NODE_ENV = "production"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  process_count = 1

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1

[checks]
  [checks.health]
    port = 3000
    type = "http"
    path = "/health"
    interval = "15s"
    timeout = "5s"
    grace_period = "10s"
